DATA:
  dataset: GraspTool
  root_path: ./datasets/grasp-tools/aug_graspall_v2
  train_split: train
  val_split: val
  offset_r: 20
  offset_sigma:
  # Randomize marked category prompts per epoch; val/test remain fixed.
  dynamic_train_prompts: True
  dynamic_prompt_seed: 2025
MODEL:
  architecture: crog
TRAIN:
  # Base Arch
  clip_pretrain: pretrain/RN50.pt
  version: multiple
  input_size: 416
  word_len: 32
  word_dim: 1024
  vis_dim: 512
  fpn_in: [512, 1024, 1024]
  fpn_out: [256, 512, 1024]

  sync_bn: False
  amp: False
  optimizer: adam
  pin_memory: False
  # Decoder
  num_layers: 3
  num_head: 8
  dim_ffn: 2048
  dropout: 0.1
  intermediate: False
  # Training Setting
  workers: 4  # per process; 32 workers total with eight NPUs
  workers_val: 2
  epochs: 50
  milestones: [35]
  start_epoch: 0
  batch_size: 8  # per NPU; global batch size 64 with eight NPUs
  batch_size_val: 8
  base_lr: 0.0001  # stable eight-NPU setting; global batch size is 64
  lr_decay: 0.1
  lr_multi: 0.1
  weight_decay: 0.
  max_norm: 1.0
  manual_seed: 0
  print_freq: 100
  # Resume & Save
  exp_name: crog_grasp_tools_v2_8npu
  output_folder: exp/grasp_tools
  save_freq: 0  # disabled; only best validation checkpoints are saved
  weight:
  resume:
  evaluate: True  # evaluate on validation set, extra NPU memory needed and small batch_size_val is recommend
  # Ablation study
  use_contrastive: True
  use_pretrained_clip: True
  use_grasp_masks: True
Distributed:
  dist_url: env://
  dist_backend: 'hccl'
  multiprocessing_distributed: True
  world_size: 1
  rank: 0
TEST:
  test_split: test
  visualize: False
