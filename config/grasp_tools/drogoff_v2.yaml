DATA:
  dataset: GraspTool
  root_path: ./datasets/grasp-tools/aug_graspall_v2
  train_split: train
  val_split: val
  offset_r: 20
  offset_sigma:
  # Randomize marked category prompts per epoch; val/test remain fixed.
  dynamic_train_prompts: True
  dynamic_prompt_seed: 2025
MODEL:
  architecture: drogoff
TRAIN:
  version: multiple
  visual_adapter_dim: 128
  visual_adapter_layer: [1,3,5,7,9,11]
  txt_adapter_dim: 64
  txtual_adapter_layer: [1,3,5,7,9,11]
  # Base Arch
  clip_pretrain: pretrain/ViT-B-16.pt
  dino_pretrain: pretrain/dinov2_vitb14_reg4_pretrain.pth
  dino_layers: 12
  output_dinov2: [4, 8]
  dino_name: dino-base
  model_name: CLIP-b-16
  input_size: 448
  word_len: 32
  word_dim: 512
  ladder_dim: 128
  nhead: 8
  multi_stage: 3
  stride: [1, 1, 1]
  vis_dim: 512
  fpn_in: [768, 768, 768] # dinov2 backbone
  fpn_out: [256, 512, 1024]

  sync_bn: False
  amp: False
  optimizer: adam
  pin_memory: False
  projector: dynamic
  # Decoder
  num_layers: 3
  num_head: 8
  dim_ffn: 512
  dropout: 0.1
  intermediate: False

  # Per-process profile for eight-NPU distributed training.
  workers: 4  # per process; 32 workers total with eight NPUs
  workers_val: 2
  epochs: 50
  milestones: [40]
  start_epoch: 0
  batch_size: 8  # per NPU; global batch size 64 with eight NPUs
  batch_size_val: 4
  base_lr: 0.0008  # 0.0001 x 8 NPUs
  lr_decay: 0.1
  lr_multi: 1
  weight_decay: 0.
  max_norm: 0.
  manual_seed: 0
  print_freq: 100
  # Resume & Save
  exp_name: drogoff_grasp_tools_v2_8npu
  offset_loss_weight: 1.0
  output_folder: exp/grasp_tools
  save_freq: 0  # disabled; only best validation checkpoints are saved
  weight:  # path to initial weight (default: none)
  resume: # path to latest checkpoint (default: none)
  evaluate: True
  use_grasp_masks: True
Distributed:
  dist_url: env://
  dist_backend: 'hccl'
  multiprocessing_distributed: True
  world_size: 1
  rank: 0

TEST:
  test_split: test
  # Re-read angle/width maps at the center refined by the offset head.
  offset_resample_geometry: True
  visualize: False
