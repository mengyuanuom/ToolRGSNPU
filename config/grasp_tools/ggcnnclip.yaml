DATA:
  dataset: GraspTool
  root_path: ./datasets/grasp-tools/aug_graspall_v2
  train_split: train
  val_split: val
  offset_r: 20
  offset_sigma:
MODEL:
  architecture: ggcnnclip
TRAIN:
  clip_pretrain: pretrain/RN50.pt
  version: multiple
  input_channels: 3
  input_size: 416
  word_len: 32
  word_dim: 1024
  amp: False
  sync_bn: False
  optimizer: adam
  pin_memory: False

  workers: 4  # per process; 32 workers total with eight NPUs
  workers_val: 2
  epochs: 50
  milestones: [35]
  start_epoch: 0
  batch_size: 32  # per NPU; global batch size 256 with eight NPUs
  batch_size_val: 32
  base_lr: 0.00004
  lr_decay: 0.1
  lr_multi: 0.1
  weight_decay: 0.0
  max_norm: 0.0
  manual_seed: 0
  print_freq: 100
  exp_name: ggcnnclip_grasp_tools_v2_8npu
  output_folder: exp/grasp_tools
  save_freq: 0  # disabled; only best validation checkpoints are saved
  weight:
  resume:
  evaluate: True
  use_pretrained_clip: True
  use_grasp_masks: True
Distributed:
  dist_url: env://
  dist_backend: hccl
  multiprocessing_distributed: True
  world_size: 1
  rank: 0
TEST:
  test_split: test
  visualize: False


