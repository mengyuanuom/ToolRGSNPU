DATA:
  dataset: vcot
  root_path: ./datasets/grasp-anything
  split_root: ./split/vcot
  prompt_template: "Grasp the {object_name}"
  train_split: train
  val_split: unseen
  offset_r: 20
  offset_sigma:
MODEL:
  architecture: graspmamba
TRAIN:
  clip_pretrain: pretrain/RN50.pt
  use_pretrained_clip: True
  mamba_model: mamba_vision_T
  mamba_pretrained: True
  mamba_pretrain: pretrain/mambavision_tiny_1k.pth.tar
  graspmamba_fusion_dim: 128
  graspmamba_instance_loss_weight: 1.0
  version: multiple
  input_size: 416
  word_len: 17
  word_dim: 1024

  sync_bn: False
  amp: False
  optimizer: adam
  pin_memory: False
  workers: 8  # per process; 16 workers total with two NPUs
  workers_val: 4
  epochs: 50
  milestones: [35, 45]
  start_epoch: 0
  batch_size: 8  # per NPU; global batch size 16 with two NPUs
  batch_size_val: 8
  base_lr: 0.001
  lr_decay: 0.1
  lr_multi: 1.0
  weight_decay: 0.0
  max_norm: 1.0
  manual_seed: 0
  print_freq: 50
  exp_name: graspmamba_vcot
  output_folder: exp/vcot
  save_freq: 10
  weight:
  resume:
  evaluate: True
  use_grasp_masks: True
Distributed:
  dist_url: env://
  dist_backend: hccl
  multiprocessing_distributed: True
  world_size: 1
  rank: 0
TEST:
  test_split: unseen
  visualize: False



